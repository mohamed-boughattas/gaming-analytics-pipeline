# Data quality checks for mart tables

# Game Analytics Mart table checks
checks for mart_game_analytics:
  - row_count > 0
  - missing_count(game_id) = 0
  - missing_count(game_name) = 0
  - duplicate_count(game_id) = 0
  
  # Business rule checks
  - invalid_count(game_id) = 0:
      valid format: number_whole
  - invalid_count(release_year) = 0:
      valid min: 1950
      valid max: 2025
  - invalid_count(average_rating) = 0:
      valid min: 0
      valid max: 10
  - invalid_count(metacritic_score) = 0:
      valid min: 0
      valid max: 100
  
  # Statistical checks
  - avg(average_rating) between 0 and 10
  - min(average_rating) >= 0
  - max(average_rating) <= 10
  - avg(metacritic_score) between 0 and 100
  - min(metacritic_score) >= 0
  - max(metacritic_score) <= 100
  
  # Data consistency checks
  - invalid_count(release_year) = 0:
      valid format: number_whole
  
  # Referential integrity (if foreign keys exist)
  - schema:
      warn:
        when required column missing: ["game_id", "game_name", "release_year"]

